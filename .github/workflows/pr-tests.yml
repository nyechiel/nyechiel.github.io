name: PR Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Ruby
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
      with:
        ruby-version-file: '.ruby-version'
        bundler-cache: true

    - name: Build Jekyll site
      run: bundle exec jekyll build
      env:
        JEKYLL_ENV: production

    - name: Test built site exists
      run: |
        if [ ! -d "_site" ]; then
          echo "Error: _site directory not found"
          exit 1
        fi
        echo "✅ Site built successfully"

    - name: Install html-proofer
      run: gem install html-proofer

    - name: Check links
      run: |
        htmlproofer _site \
          --disable-external \
          --ignore-urls "/^\/2[0-9]{3}\//,/^https:\/\/nyechiel\.com\/2[0-9]{3}\//" \
          --no-enforce-https

    - name: No Font Awesome references
      run: |
        if grep -r 'fontawesome' _site/ --include='*.html' -l; then
          echo "FAIL: Font Awesome references found in built site"
          exit 1
        fi
        echo "PASS: No Font Awesome references"

    - name: No trailing spaces in post filenames
      run: |
        if ls _posts/*' '* 2>/dev/null; then
          echo "FAIL: Post filenames with trailing spaces found"
          exit 1
        fi
        echo "PASS: No trailing spaces in filenames"

    - name: Check skip-to-content link exists
      run: |
        grep -q 'class="skip-link"' _site/index.html
        grep -q 'id="main-content"' _site/index.html
        echo "skip-to-content link found"

    - name: Check aria-label on hamburger menu
      run: |
        grep -q 'aria-label="Menu"' _site/index.html
        echo "hamburger aria-label found"

    - name: Check aria-label on nav search input
      run: |
        grep -q 'aria-label="Search posts and notes"' _site/index.html
        echo "search input aria-label found"

    - name: Check aria-live on search results
      run: |
        grep -q 'aria-live="polite"' _site/index.html
        grep -q 'aria-live="polite"' _site/search/index.html
        echo "aria-live regions found"

    - name: Check lazy loading on images
      run: |
        grep -q 'loading="lazy"' _site/index.html
        echo "lazy loading found on homepage"

    - name: Check notes index page exists
      run: |
        test -f _site/notes/index.html
        grep -q 'note-disclaimer' _site/notes/index.html
        echo "notes index page found with disclaimer"

    - name: Check notes excluded from RSS feed
      run: |
        if grep -q '/notes/' _site/feed.xml; then
          echo "FAIL: notes URLs found in RSS feed"
          exit 1
        fi
        echo "notes correctly excluded from feed"

    - name: Check note layout exists
      run: |
        test -f _layouts/note.html
        grep -q 'post-content' _layouts/note.html
        echo "note layout found"

    - name: Check search.json includes type field
      run: |
        python3 -c "
        import json
        with open('_site/search.json') as f:
            data = json.load(f)
        for item in data:
            assert 'type' in item, f'Missing type field in: {item.get(\"title\", \"unknown\")}'
        print(f'All {len(data)} search entries have type field')
        "

    - name: Check external JS files exist
      run: |
        test -f _site/assets/js/nav-search.js
        test -f _site/assets/js/comments.js
        test -f _site/assets/js/search.js
        test -f _site/assets/js/tags.js
        echo "all external JS files found"

    - name: Check no inline script blocks in templates
      run: |
        INLINE_COUNT=$(grep -c '<script>' _site/index.html || true)
        JSONLD_COUNT=$(grep -c 'application/ld+json' _site/index.html || true)
        if [ "$INLINE_COUNT" -gt "$JSONLD_COUNT" ]; then
          echo "FAIL: found inline scripts beyond JSON-LD in index.html"
          exit 1
        fi
        echo "no unexpected inline scripts"

    - name: Check data attributes for Liquid values
      run: |
        grep -q 'data-search-url=' _site/index.html
        grep -q 'data-search-url=' _site/search/index.html
        echo "data attributes found"

    - name: Check Content-Security-Policy header
      run: |
        grep -q 'Content-Security-Policy' _site/index.html
        echo "CSP meta tag found"

    - name: Check X-Content-Type-Options header
      run: |
        grep -q 'X-Content-Type-Options' _site/index.html
        echo "X-Content-Type-Options meta tag found"

    - name: Check Referrer-Policy header
      run: |
        grep -q 'Referrer-Policy' _site/index.html
        echo "Referrer-Policy meta tag found"

    - name: Check 404 page has navigation links
      run: |
        grep -q 'href="/blog/"' _site/404.html
        grep -q 'href="/search/"' _site/404.html
        echo "404 page has navigation links"

    - name: Check URL validator rejects path traversal
      run: |
        grep -q "\.\." _site/assets/js/comments.js
        echo "path traversal check present in URL validator"

    - name: Check no duplicate structured data on posts
      run: |
        POST=$(find _site/blog -name 'index.html' | head -1)
        COUNT=$(grep -c 'application/ld+json' "$POST")
        if [ "$COUNT" -gt 1 ]; then
          echo "FAIL: found $COUNT JSON-LD blocks in $POST (expected 1)"
          exit 1
        fi
        echo "single JSON-LD block found"

    - name: Check no-comments-found hidden by default
      run: |
        grep -q '#no-comments-found' _site/assets/main.css
        echo "no-comments-found CSS rule found"

    - name: Check comment avatars have alt text
      run: |
        grep -q "avatar" _site/assets/js/comments.js
        grep -q "setAttribute.*alt" _site/assets/js/comments.js
        echo "avatar alt text found"

    - name: Check subscribe forms have accessible labels
      run: |
        grep -q 'aria-label="Email address"' _site/index.html
        POST=$(find _site/blog/20* -name 'index.html' | tail -1)
        grep -q 'aria-label="Email address"' "$POST"
        echo "subscribe form labels found"

  markdown-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Lint Markdown files
      uses: nosborn/github-action-markdown-cli@508d6cefd8f0cc99eab5d2d4685b1d5f470042c1 # v3.5.0
      with:
        files: .
        config_file: .markdownlint.json
        ignore_files: vendor/

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Ruby
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
      with:
        ruby-version-file: '.ruby-version'
        bundler-cache: true

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Update advisory database
      run: bundler-audit update

    - name: Run bundle audit
      run: bundler-audit check

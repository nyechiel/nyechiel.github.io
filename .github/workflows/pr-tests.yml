name: PR Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version-file: '.ruby-version'
        bundler-cache: true

    - name: Install dependencies
      run: bundle install

    - name: Build Jekyll site
      run: bundle exec jekyll build
      env:
        JEKYLL_ENV: production

    - name: Test built site exists
      run: |
        if [ ! -d "_site" ]; then
          echo "Error: _site directory not found"
          exit 1
        fi
        echo "✅ Site built successfully"

    - name: Install html-proofer
      run: gem install html-proofer

    - name: Check links
      run: |
        htmlproofer _site \
          --disable-external \
          --ignore-urls "/^\/2[0-9]{3}\//,/^https:\/\/nyechiel\.com\/2[0-9]{3}\//,/fontawesome/" \
          --no-enforce-https

  markdown-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Lint Markdown files
      uses: nosborn/github-action-markdown-cli@508d6cefd8f0cc99eab5d2d4685b1d5f470042c1 # v3.5.0
      with:
        files: .
        config_file: .markdownlint.json
        ignore_files: vendor/

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version-file: '.ruby-version'
        bundler-cache: true

    - name: Install bundler-audit
      run: gem install bundler-audit

    - name: Update advisory database
      run: bundler-audit update

    - name: Run bundle audit
      run: bundler-audit check

  site-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version-file: '.ruby-version'
        bundler-cache: true

    - name: Build Jekyll site
      run: bundle exec jekyll build
      env:
        JEKYLL_ENV: production

    - name: Check Content-Security-Policy header
      run: |
        grep -q 'Content-Security-Policy' _site/index.html
        echo "CSP meta tag found"

    - name: Check X-Content-Type-Options header
      run: |
        grep -q 'X-Content-Type-Options' _site/index.html
        echo "X-Content-Type-Options meta tag found"

    - name: Check Referrer-Policy header
      run: |
        grep -q 'Referrer-Policy' _site/index.html
        echo "Referrer-Policy meta tag found"

    - name: Check 404 page has navigation links
      run: |
        grep -q 'href="/blog/"' _site/404/index.html
        grep -q 'href="/search/"' _site/404/index.html
        echo "404 page has navigation links"

    - name: Check URL validator rejects path traversal
      run: |
        POSTFILE=$(find _site/blog -name "*.html" -exec grep -l 'isValidGitHubURL' {} \; | head -1)
        grep -q "\.\\." "$POSTFILE"
        echo "path traversal check present in URL validator"
